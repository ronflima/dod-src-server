//Comandos de Console
//
//tv_enable <0 | 1> - Ativa SourceTV no servidor do jogo local, SourceTV bot aparece como cliente espectador após a próxima changelevel (somente mestre).
tv_enable 1

//tv_name <name> - Define nome SourceTV como aparece no navegador do servidor e painel de avaliação (somente mestre).
tv_name |T.Z|TV Tolerancia Zero


//tv_maxclients <0..255> - Define o número máximo de cliente para servidor / proxy SourceTV local (padrão 128).
tv_maxclients 10

//tv_delay <segundos> - Fonte atraso de transmissão de TV em segundos (apenas master).
tv_delay 2

//tv_autorecord <0 | 1> - Grava automaticamente cada jogo, formato de nome de arquivo demo é auto-AAAAMMDD-hhmm-map.dem
tv_autorecord 0

//tv_transmitall <0 | 1> - Por entidades e eventos fora da visão de auto-diretor padrão sejam
//removidos das transmissões SourceTV para economizar largura de banda. Se tv_transmitall está
//ativado, todo o jogo é transmitido e os espectadores podem mudar seu ponto de vista a qualquer 
//jogador que eles querem. Esta opção aumentam as necessidades de largura de banda por cliente 
//espectador pelo fator 2-3.
tv_transmitall 1

//tv_maxrate <bytes> - Define o gasto máximo de largura de banda por cliente em bytes / segundo (padrão 5000)
tv_maxrate 25000

//tv_stop - Acaba de transmitir o jogo via SourceTV.

//tv_status - Mostra SourceTV informações específicas.

//tv_clients - Mostra uma lista de todos os clientes para o público se conectar ao servidor SourceTV 

//tv_msg <text> - Envie uma mensagem de HUD para todos os clientes conectados espectador SourceTV

//tv_retry - Reconecta o proxy relé SourceTV ao último endereço conhecido (retransmitir apenas).

//tv_autoretry <0 | 1> - Se ativado, SourceTV proxies relé tentar se reconectar para durar servidor conhecido após a conexão foi perdida.

//tv_timeout <segundos> - Define SourceTV procuração relé tempo limite de conexão em segundos. Se uma conexão expira, o proxy relé tenta se reconectar automaticamente.

//tv_delaymapchange <0 | 1> - Atrasa a mudança de mapa no servidor do jogo até resto do jogo tamponada foi transmitido

//tv_port <porta> - Defina a porta do host SourceTV (padrão 27020). Deve ser definido como srcds começar parâmetro.
//tv_port 27025

//tv_snapshotrate <n> - Define snapshots mundo transmitidas por segundo por SourceTV (somente mestre).

//tv_password <password> - Sets necessário senha para conectar espectadores.

//tv_relaypassword <password> - Sets necessário senha para conectar proxies relé. Os proxies de ligação simplesmente usar "password <password>" para conectar-se tv_relaypassword do seu homólogo.

//tv_relay <IP> - Conecta-se um servidor de retransmissão para outro servidor SourceTV / proxy

//tv_record <filename> - Inicia uma gravação demo SourceTV que registra todas as entidades e eventos (somente mestre)

//tv_stoprecord - Pára demonstração SourceTV gravação (somente mestre)

//tv_debug <0 | 1> - Mostra mensagens adicionais de depuração

//tv_dispatchmode <0 | 1 | 2> - Define o modo de expedição cliente Fonte para clientes que se conectam: 0 = nunca, 1 = se for o caso, 2 = sempre

//tv_overrideroot <0 | 1> - Substitui a transmissão IP mestre para espectadores com um IP local.

//tv_relayvoice <0 | 1> - Se ativado, permitir bate-papo de voz jogador se transmitido (somente mestre)

//tv_chattimelimit <segundos> - Espectadores limites para conversar apenas a cada n segundos

//tv_chatgroupsize <n> - Definir o tamanho do grupo de chat para n espectadores. Somente espectadores no mesmo grupo de bate-papo pode falar uns com os outros. Grupos bate-papo estão desligados com "tv_chatgroupsize 0" e todo mundo pode falar com todo mundo. Definir grupos de chat ajuda a reduzir o ruído tagarelice e economiza um pouco da banda.

//tv_chatgroup <name> - Permite que os espectadores de escolher o seu grupo de bate-papo. Se nenhum nome se for dada a grupo de chat atual é mostrado (somente para clientes)

//tv_nochat <0 | 1> - Desativa outros espectadores bate-papo linhas (somente para clientes)

//tv_allow_static_shots <0 | 1> - Permite auto-diretor para escolher tomadas de câmera fixa (somente mestre)

//tv_allow_camera_man <0 | 1> - Permite que os clientes para o público em servidor de jogo para se tornar SourceTV câmera homens (somente mestre)
tv_allow_camera_man 0

