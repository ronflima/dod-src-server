// server name
hostname "Família Young Brasil" 

// rcon passsword
rcon_password "fmyoungrox" 

// Server password
sv_password "" 

// server cvars
sv_cheats 1
mp_friendlyfire 1 
mp_footsteps 1 
mp_autoteambalance 1 
mp_autokick 0 
mp_flashlight 1 
mp_tkpunish 1 
mp_forcecamera 0 
mp_timelimit 22
sv_friction "8"
sv_alltalk 1 
sv_pausable 0 
sv_cheats 0 
sv_consistency 1 
sv_maxspeed 320 
mp_limitteams 1
mp_hostagepenalty 5 
sv_voiceenable 1 
mp_allowspectators 1 
mp_chattime 10 
sv_timeout 65 
decalfrequency 0

// round specific cvars
mp_freezetime 3 
mp_fraglimit 0 
mp_winlimit 0 
dod_freezecam 0        //0 = disables "killcam"   

// bandwidth rates/settings
sv_minrate 13000 
sv_maxrate 25000 
sv_minupdaterate 66 
sv_maxupdaterate 66 
sv_mincmdrate 66 
sv_maxcmdrate 66 
sv_client_cmdrate_difference 1 
sv_client_predict 1 
sv_client_interpolate 1 
sv_client_min_interp_ratio -1 
sv_client_max_interp_ratio -1 

// server logging
log "on"
sv_logbans "1"
sv_logecho "0"
sv_logfile "1"
sv_log_onefile "1"

// operation
// Keep enabled for LAN discovery and local play.
sv_lan 1
sv_region 2
sv_contact contato@tz.com.br

// execute ban files
exec banned_user.cfg 
exec banned_ip.cfg

// Fast Downloads
//sv_downloadurl "http://52.67.41.34/fdl/"
//sv_downloadurl "http://177.54.156.236/fdl/"
sv_allowupload 1
sv_allowdownload 1

//Paraquedas
sm_parachute_roundmsg 0

// class limits, 0=nenhuma permitida, -1=sem limite, ex: 5=limite de 5 armas
